<body>

<button id="startBtn" style="
position: fixed;
top: 40%;
left: 50%;
transform: translate(-50%, -50%);
padding: 20px;
font-size: 20px;
z-index: 999;
">
🚀 Start Inspection
</button>

<a-scene id="scene"
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none;">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-box position="0 0 0" scale="0.5 0.5 0.1" color="red"></a-box>

    <a-text value="Check Emergency Button"
            position="0 0.5 0"
            align="center"
            color="white"></a-text>

  </a-entity>

</a-scene>

<div class="ui">
  <div id="text">Step 1: Emergency Button</div>

  <button onclick="capture()">📸 Capture</button>
  <button onclick="ok()">✅ OK</button>
  <button onclick="notok()">❌ Not OK</button>
</div>

<script>
document.getElementById("startBtn").addEventListener("click", async () => {
  const scene = document.querySelector("#scene");
  scene.style.display = "block";

  const mindarSystem = scene.systems["mindar-image"];
  await mindarSystem.start();

  document.getElementById("startBtn").style.display = "none";
});
