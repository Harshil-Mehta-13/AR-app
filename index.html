<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Compressor AR Checklist</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    .ui {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 10px;
    }
    button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<a-scene mindar-image="imageTargetSrc: targets.mind;" 
         vr-mode-ui="enabled: false"
         device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- AR TARGET -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Highlight Box -->
    <a-box position="0 0 0" scale="0.5 0.5 0.1" color="red"></a-box>

    <!-- Text -->
    <a-text value="Check Emergency Button"
            position="0 0.5 0"
            align="center"
            color="white"></a-text>

  </a-entity>

</a-scene>

<div class="ui">
  <div id="text">Step 1: Emergency Button</div>

  <button onclick="capture()">📸 Capture</button>
  <button onclick="ok()">✅ OK</button>
  <button onclick="notok()">❌ Not OK</button>
</div>

<script>
let step = 1;

function nextStep(){
  step++;
  document.getElementById("text").innerText = "Step " + step;
}

function capture(){
  alert("Image Captured (prototype)");
  nextStep();
}

function ok(){
  nextStep();
}

function notok(){
  nextStep();
}
</script>

</body>
</html>
